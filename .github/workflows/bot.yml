name: Gate Launchpool Tracker

on:
  schedule:
    # Це розклад за всесвітнім часом (UTC). 
    # Запускається 10 разів на день (з 9:00 до 23:00 за Київським часом). Вночі спить.
    - cron: '0 6,7,9,11,13,14,16,18,19,20 * * *'
  workflow_dispatch: # Цей рядок дозволяє запускати бота вручну кнопкою

jobs:
  check-site:
    runs-on: ubuntu-latest
    steps:
      - name: Завантажуємо файли репозиторію
        uses: actions/checkout@v4

      - name: Встановлюємо Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Встановлюємо необхідні бібліотеки
        run: pip install requests beautifulsoup4

      - name: Запускаємо наш Python скрипт
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py

      - name: Зберігаємо оновлений список проектів
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_state.txt || true
          git commit -m "Оновлено список launchpool" || true
          git push || true
